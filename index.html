<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Time tracking dashboard</title>

  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>

</head>
<body>
  <main>
    <article class="time-tracking-dashboard__container">
      <div class="time-tracking-dashboard__toggle">
        <div class="dashboard__profile">
          <div class="dashboard__profile-content">
            <img src="images/image-jeremy.png" alt="Jeremy Robson Profile Picture">
            <div class="dashboard__profile-name">
              <span class="span__report-text">Report for</span><br>
              <span class="span__profile-name">Jeremy Robson</span>
            </div>
          </div>
        </div>

        <div class="dashboard__time-toggle">
          <button class="dashboard__toggle-btn">Daily</button>
          <button class="dashboard__toggle-btn active">Weekly</button>
          <button class="dashboard__toggle-btn">Monthly</button>
        </div>
      </div>
      
      <!-- 1. WORK CARD CATEGORY -->
      <div class="time-tracking-dashboard__card time-tracking-dashboard__card--work">
        <div class="card__color-highlight">
          <img src="images/icon-work.svg" alt="work icon" class="icon">
        </div>

        <div class="card__content">
          <div class="card__menu">
            <span class="card-category">Work</span>
            <img src="images/icon-ellipsis.svg" alt="ellipsis">
          </div>
          <div class="card__time">
            <span class="time-current">32hrs</span>
            <p>Last Week - <span class="time-previous">36hrs</span></p>
          </div>
        </div>
      </div>

      <!-- 2. PLAY CARD CATEGORY -->
      <div class="time-tracking-dashboard__card time-tracking-dashboard__card--play">
        <div class="card__color-highlight">
          <img src="images/icon-play.svg" alt="play icon" class="icon">
        </div>

        <div class="card__content">
          <div class="card__menu">
            <span class="card-category">Play</span>
            <img src="images/icon-ellipsis.svg" alt="ellipsis">
          </div>
          <div class="card__time">
            <span class="time-current">10hrs</span>
            <p>Last Week - <span class="time-previous">8hrs</span></p>
          </div>
        </div>
      </div>

      <!-- 3. STUDY CARD CATEGORY -->
      <div class="time-tracking-dashboard__card time-tracking-dashboard__card--study">
        <div class="card__color-highlight">
          <img src="images/icon-study.svg" alt="study icon" class="icon">
        </div>

        <div class="card__content">
          <div class="card__menu">
            <span class="card-category">Study</span>
            <img src="images/icon-ellipsis.svg" alt="ellipsis">
          </div>
          <div class="card__time">
            <span class="time-current">4hrs</span>
            <p>Last Week - <span class="time-previous">7hrs</span></p>
          </div>
        </div>
      </div>

      <!-- 4. EXERCISE CARD CATEGORY -->
      <div class="time-tracking-dashboard__card time-tracking-dashboard__card--exercise">
        <div class="card__color-highlight">
          <img src="images/icon-exercise.svg" alt="exercise icon" class="icon">
        </div>

        <div class="card__content">
          <div class="card__menu">
            <span class="card-category">Exercise</span>
            <img src="images/icon-ellipsis.svg" alt="ellipsis">
          </div>
          <div class="card__time">
            <span class="time-current">4hrs</span>
            <p>Last Week - <span class="time-previous">5hrs</span></p>
          </div>
        </div>
      </div>

      <!-- 5. SOCIAL CARD CATEGORY -->
      <div class="time-tracking-dashboard__card time-tracking-dashboard__card--social">
        <div class="card__color-highlight">
          <img src="images/icon-social.svg" alt="social icon" class="icon">
        </div>

        <div class="card__content">
          <div class="card__menu">
            <span class="card-category">Social</span>
            <img src="images/icon-ellipsis.svg" alt="ellipsis">
          </div>
          <div class="card__time">
            <span class="time-current">5hrs</span>
            <p>Last Week - <span class="time-previous">10hrs</span></p>
          </div>
        </div>
      </div>

      <!-- 6. SELF CARE CARD CATEGORY -->
      <div class="time-tracking-dashboard__card time-tracking-dashboard__card--self-care">
        <div class="card__color-highlight">
          <img src="images/icon-self-care.svg" alt="self care icon" class="icon">
        </div>

        <div class="card__content">
          <div class="card__menu">
            <span class="card-category">Self Care</span>
            <img src="images/icon-ellipsis.svg" alt="ellipsis">
          </div>
          <div class="card__time">
            <span class="time-current">2hrs</span>
            <p>Last Week - <span class="time-previous">2hrs</span></p>
          </div>
        </div>
      </div>
    </article>
  </main>
</html>
